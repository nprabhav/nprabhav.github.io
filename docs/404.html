<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 - Prabhav Nalhe</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <style>
    :root {
      --ink:#37352F; --muted:#787774; --accent:#2383E2; --term-green:#9ece6a;
      --sans: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", "Helvetica Neue", Arial, sans-serif;
      --mono: "SF Mono", "JetBrains Mono", "Menlo", "Consolas", monospace;
    }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
           background:#fff; color:var(--ink); font-family:var(--sans); text-align:center; padding:24px; }
    .mono { font-family:var(--mono); color:var(--muted); font-size:14px; }
    .mono .cur { display:inline-block; width:8px; height:1em; background:var(--term-green);
                 vertical-align:-2px; margin-left:4px; }
    h1 { font-size:46px; font-weight:700; letter-spacing:-0.5px; margin:14px 0 6px; }
    p { color:var(--muted); margin:0 0 20px; }
    a { color:var(--accent); text-decoration:none; }
    a:hover { text-decoration:underline; text-underline-offset:2px; }
  </style>
</head>
<body>
  <div>
    <div class="mono">&gt; nprabhav:~$ cat 404<span class="cur"></span></div>
    <h1>404</h1>
    <p>That page does not exist.</p>
    <a href="/">&larr; back home</a>
  </div>
</body>
</html>
