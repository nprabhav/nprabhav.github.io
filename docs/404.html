<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 — Prabhav Nalhe</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#0a0a0a">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<script>(function(){try{var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);else if(matchMedia('(prefers-color-scheme: light)').matches)document.documentElement.setAttribute('data-theme','light')}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0a0a0a; --text:#c9c9c4; --lo:#8a8a85; --faint:#5c5c58; --accent:#6ee7a0; --line:rgba(255,255,255,.08); }
  [data-theme="light"] { --bg:#fcfcfa; --text:#3c3c41; --lo:#6f6f74; --faint:#9c9ca1; --accent:#0f8a4d; --line:rgba(20,20,24,.09); }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'JetBrains Mono',ui-monospace,Menlo,monospace; min-height:100vh; display:grid; place-items:center; padding:24px; }
  .term { width:min(560px,100%); border:1px solid var(--line); border-radius:14px; padding:28px; line-height:2; font-size:14px; }
  .p { color:var(--accent); }
  .dim { color:var(--faint); }
  a { color:var(--accent); }
  .cursor { animation:blink 1.2s steps(1) infinite; }
  @keyframes blink { 50% { opacity:0; } }
  @media (prefers-reduced-motion: reduce){ .cursor{animation:none} }
</style>
</head>
<body>
  <div class="term">
    <div><span class="p">nprabhav:~$</span> cat <span id="path">/this/page</span></div>
    <div>cat: no such file or directory <span class="dim">(404)</span></div>
    <div class="dim"># maybe one of these?</div>
    <div><span class="p">nprabhav:~$</span> ls</div>
    <div><a href="/">home/</a>&nbsp;&nbsp;<a href="/index.html#work">work/</a>&nbsp;&nbsp;<a href="/notes/index.html">notes/</a>&nbsp;&nbsp;<a href="/resume.html">resume</a></div>
    <div><span class="p">nprabhav:~$</span> <span class="cursor">▊</span></div>
  </div>
  <script>document.getElementById('path').textContent = location.pathname;</script>
</body>
</html>
