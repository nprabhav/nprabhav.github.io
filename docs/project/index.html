const un=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
const unurl=s=>{s=s.replace(/-/g,'+').replace(/_/g,'/');while(s.length%4)s+='=';return un(s);};
const urlb64=b=>btoa(String.fromCharCode(...new Uint8Array(b))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
const store=k=>{try{localStorage.setItem(LSK,urlb64(k));}catch(e){}};
const load=()=>{try{const v=localStorage.getItem(LSK);return v?unurl(v):null;}catch(e){return null;}};
async function decWithKey(k){
 const key=await crypto.subtle.importKey('raw',k,'AES-GCM',false,['decrypt']);
 const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:un(CNONCE)},key,un(CT));
 return new TextDecoder().decode(pt);
}
async function unwrap(pw){
 const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
 const kek=await crypto.subtle.deriveKey({name:'PBKDF2',salt:un(SALT),iterations:ITER,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
 const raw=await crypto.subtle.decrypt({name:'AES-GCM',iv:un(WNONCE)},kek,un(WK));
 return new Uint8Array(raw);
}
function render(html){document.open();document.write(html);document.close();}
function showGate(){document.getElementById('gate').style.display='';setTimeout(()=>{const p=document.getElementById('pw');if(p)p.focus();},30);}
async function go(){
 const pw=document.getElementById('pw').value;if(!pw)return;
 try{
  const k=await unwrap(pw);
  const html=await decWithKey(k);
  if(document.getElementById('rem').checked)store(k);
  render(html);
 }catch(e){document.getElementById('err').textContent='incorrect phrase - try again';}
}
function copyLink(){
 const t=document.getElementById('dl').textContent;
 (navigator.clipboard?navigator.clipboard.writeText(t):Promise.reject()).catch(()=>{});
 const b=event.target;b.textContent='copied ✓';setTimeout(()=>b.textContent='Copy device link',1600);
}
(async function(){
 // 1) device link in the URL fragment
 const h=location.hash||'';
 const mk=h.match(/[#&]k=([A-Za-z0-9_-]+)/);
 if(mk){
  try{
   const k=unurl(mk[1]);
   const html=await decWithKey(k);
   store(k);
   history.replaceState(null,'',location.pathname);
   return render(html);
  }catch(e){/* bad/rotated link -> fall through */}
 }
 // 2) remembered device
 const rk=load();
 if(rk){
  try{
   const html=await decWithKey(rk);
   // #share on a trusted device: reveal the shareable device link instead of rendering
   if(/[#&]share/.test(h)){
    showGate();
    document.getElementById('dl').textContent=location.origin+location.pathname+'#k='+urlb64(rk);
    document.getElementById('share').classList.add('on');
    document.querySelector('.gate p').textContent='This device is trusted. Share the link below to whitelist another device.';
    return;
   }
   return render(html);
  }catch(e){try{localStorage.removeItem(LSK);}catch(_){}}
 }
 // 3) locked
 showGate();
})();
